// Main app — routing, state, auth, persistence.

const { useState, useEffect, useMemo, useCallback } = React;

// Hash routing.
//   #/                 → app (dashboard / builder / etc — requires auth)
//   #/r/<survey-id>    → public respondent form (no auth required)
const parseHash = () => {
  const h = (window.location.hash || '').replace(/^#/, '');
  const m = h.match(/^\/r\/([A-Za-z0-9_-]{6,})$/);
  if (m) return { kind: 'respondent', id: m[1] };
  return { kind: 'app' };
};

const CenterMsg = ({ emoji, title, subtitle, action }) => (
  <div style={{ minHeight: '100vh', background: 'var(--bg)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20 }}>
    <div style={{ maxWidth: 420, textAlign: 'center' }}>
      <div style={{ fontSize: 64, marginBottom: 16 }}>{emoji}</div>
      <h1 style={{ fontSize: 24, fontWeight: 800, letterSpacing: '-0.02em', margin: '0 0 10px' }}>{title}</h1>
      {subtitle && <p style={{ fontSize: 14, color: 'var(--ink-3)', lineHeight: 1.55, marginBottom: 20 }}>{subtitle}</p>}
      {action}
    </div>
  </div>
);

const DemoBanner = () => (
  <div style={{
    position: 'fixed', top: 12, left: '50%', transform: 'translateX(-50%)',
    background: 'var(--ink)', color: 'var(--bg)',
    padding: '8px 14px', borderRadius: 999, fontSize: 12, fontWeight: 600,
    boxShadow: 'var(--shadow)', zIndex: 900, display: 'inline-flex', alignItems: 'center', gap: 8
  }}>
    <Icon name="eye" size={13} /> 데모 모드 — 로컬에서만 동작해요
  </div>
);

const PublicRespondent = ({ surveyId, onToast }) => {
  const [state, setState] = React.useState({ status: 'loading', survey: null, error: null });

  React.useEffect(() => {
    let alive = true;
    (async () => {
      if (!api.configured) {
        if (alive) setState({ status: 'error', error: '이 Formit 배포에는 백엔드가 설정되지 않았어요.' });
        return;
      }
      try {
        const survey = await api.getPublicSurvey(surveyId);
        if (!alive) return;
        if (!survey.sections || survey.sections.length === 0) {
          setState({ status: 'error', error: '아직 문항이 없는 설문이에요.' });
          return;
        }
        setState({ status: 'ready', survey });
      } catch (e) {
        if (alive) setState({ status: 'error', error: e?.message || '설문을 불러올 수 없어요.' });
      }
    })();
    return () => { alive = false; };
  }, [surveyId]);

  if (state.status === 'loading') return <CenterMsg emoji="⏳" title="설문을 불러오는 중이에요" subtitle="잠시만 기다려주세요" />;
  if (state.status === 'error') return <CenterMsg emoji="😢" title="설문을 열 수 없어요" subtitle={state.error}
    action={<button className="btn primary" onClick={() => { window.location.hash = ''; window.location.reload(); }}>Formit 홈으로</button>} />;

  return (
    <Respondent
      survey={state.survey}
      publicMode
      setActiveView={() => {}}
      onToast={onToast}
      onSubmit={async (answers) => { await api.submitResponse(state.survey.id, answers); }}
    />
  );
};

const App = () => {
  const [route, setRoute] = useState(parseHash);
  const [authState, setAuthState] = useState({ status: 'loading', user: null });
  const [demoMode, setDemoMode] = useState(false);
  const [surveys, setSurveys] = useState([]);
  const [activeView, setActiveView] = useState({ view: 'landing' });
  const [toast, setToast] = useState('');
  const [tweaks, setTweaks] = useState(() => window.__FORMIT_TWEAKS || {
    accentHue: 'rose', density: 'cozy', cornerStyle: 'rounded', respondentStyle: 'paged'
  });
  const [tweaksOpen, setTweaksOpen] = useState(false);

  // Hash listener
  useEffect(() => {
    const onHash = () => setRoute(parseHash());
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  // Auth bootstrap (skipped on public respondent route)
  useEffect(() => {
    if (route.kind === 'respondent') return;
    if (!api.configured) {
      setDemoMode(true);
      setAuthState({ status: 'signed-out', user: null });
      setSurveys(SEED_SURVEYS);
      return;
    }
    let unsub = null;
    (async () => {
      const session = await api.getSession();
      setAuthState(session ? { status: 'signed-in', user: session.user } : { status: 'signed-out', user: null });
    })();
    const { data } = api.client.auth.onAuthStateChange((_e, session) => {
      setAuthState(session ? { status: 'signed-in', user: session.user } : { status: 'signed-out', user: null });
    });
    unsub = data?.subscription;
    return () => { try { unsub?.unsubscribe(); } catch(_) {} };
  }, [route.kind]);

  const reloadSurveys = useCallback(async () => {
    if (demoMode || authState.status !== 'signed-in') return;
    try {
      const list = await api.listSurveys();
      setSurveys(list);
    } catch (e) {
      setToast(e?.message || '설문 목록을 불러오지 못했어요');
    }
  }, [authState.status, demoMode]);

  useEffect(() => {
    if (authState.status === 'signed-in' && !demoMode) {
      reloadSurveys();
      setActiveView(v => v.view === 'landing' ? { view: 'dashboard' } : v);
    } else if (authState.status === 'signed-out' && !demoMode) {
      setSurveys([]);
      setActiveView({ view: 'landing' });
    }
  }, [authState.status, demoMode, reloadSurveys]);

  // Tweaks protocol
  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch(_) {}
    return () => window.removeEventListener('message', handler);
  }, []);

  // Current survey (either from list, or a new draft)
  const currentSurvey = useMemo(() => {
    if (!activeView.surveyId) return null;
    if (activeView.surveyId === 'new') {
      let template = null;
      if (activeView.templateId) template = TEMPLATES.find(t => t.id === activeView.templateId);
      return {
        id: 'srv_new_' + uid(),
        title: template ? template.title : '새 설문',
        description: template ? template.desc : '',
        emoji: template ? template.emoji : '✨',
        status: 'draft',
        createdAt: new Date().toISOString().slice(0, 10),
        responses: 0, completionRate: 0, avgTime: '—',
        color: template?.accent || '#E03E6C',
        sections: [
          { id: uid(), title: '첫 번째 섹션', description: '', questions: [] }
        ]
      };
    }
    return surveys.find(s => s.id === activeView.surveyId);
  }, [activeView, surveys]);

  const upsertLocal = (s) => {
    setSurveys(prev => {
      const i = prev.findIndex(x => x.id === s.id);
      if (i >= 0) { const next = [...prev]; next[i] = s; return next; }
      return [s, ...prev];
    });
  };

  const handleSurveyUpdate = async (updated) => {
    const isNew = currentSurvey && currentSurvey.id && String(currentSurvey.id).startsWith('srv_new_');
    if (demoMode) {
      if (isNew) {
        const real = { ...updated, id: 'srv_' + uid() };
        upsertLocal(real);
        setActiveView({ view: 'builder', surveyId: real.id });
      } else {
        upsertLocal(updated);
      }
      return;
    }
    try {
      if (isNew) {
        const created = await api.createSurvey(updated);
        upsertLocal(created);
        setActiveView({ view: 'builder', surveyId: created.id });
      } else {
        const saved = await api.updateSurvey(updated.id, updated);
        upsertLocal(saved);
      }
    } catch (e) { setToast(e?.message || '저장에 실패했어요'); }
  };

  const handleDelete = async (id) => {
    if (!confirm('정말 삭제하시겠어요? 응답도 함께 삭제돼요.')) return;
    if (demoMode) {
      setSurveys(prev => prev.filter(s => s.id !== id));
      setToast('설문이 삭제되었어요');
      return;
    }
    try {
      await api.deleteSurvey(id);
      setSurveys(prev => prev.filter(s => s.id !== id));
      setToast('설문이 삭제되었어요');
    } catch (e) { setToast(e?.message || '삭제에 실패했어요'); }
  };

  const handleDuplicate = async (id) => {
    if (demoMode) {
      const src = surveys.find(s => s.id === id);
      if (!src) return;
      const copy = {
        ...src, id: 'srv_' + uid(),
        title: src.title + ' (복제본)', status: 'draft',
        responses: 0, completionRate: 0, avgTime: '—',
        createdAt: new Date().toISOString().slice(0, 10)
      };
      setSurveys(prev => [copy, ...prev]);
      setToast('설문이 복제되었어요 ✓');
      return;
    }
    try {
      const copy = await api.duplicateSurvey(id);
      upsertLocal(copy);
      setToast('설문이 복제되었어요 ✓');
    } catch (e) { setToast(e?.message || '복제에 실패했어요'); }
  };

  const handleShare = async () => {
    if (!currentSurvey) return;
    if (demoMode) {
      upsertLocal({ ...currentSurvey, status: 'live' });
      setActiveView({ view: 'share', surveyId: currentSurvey.id });
      setToast('설문이 공개되었어요 🎉');
      return;
    }
    try {
      let id = currentSurvey.id;
      if (String(id).startsWith('srv_new_')) {
        const created = await api.createSurvey({ ...currentSurvey, status: 'live' });
        upsertLocal(created);
        id = created.id;
      } else {
        const saved = await api.updateSurvey(id, { ...currentSurvey, status: 'live' });
        upsertLocal(saved);
      }
      setActiveView({ view: 'share', surveyId: id });
      setToast('설문이 공개되었어요 🎉');
    } catch (e) { setToast(e?.message || '공개에 실패했어요'); }
  };

  const handleSignIn = async () => {
    if (!api.configured) {
      setToast('데모 모드입니다. Supabase 설정 후 실제 로그인이 가능해요.');
      setActiveView({ view: 'dashboard' });
      return;
    }
    try { await api.signInWithGoogle(); }
    catch (e) { setToast(e?.message || '로그인을 시작할 수 없어요'); }
  };

  const handleSignOut = async () => {
    if (demoMode) { setActiveView({ view: 'landing' }); return; }
    try { await api.signOut(); setActiveView({ view: 'landing' }); }
    catch (e) { setToast(e?.message || '로그아웃 실패'); }
  };

  // ========== Render ==========

  // Public respondent: no auth, no shell.
  if (route.kind === 'respondent') {
    return (
      <>
        <PublicRespondent surveyId={route.id} onToast={setToast} />
        {tweaksOpen && <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} onClose={() => setTweaksOpen(false)} />}
        <Toast message={toast} onClose={() => setToast('')} />
      </>
    );
  }

  if (authState.status === 'loading') {
    return <CenterMsg emoji="✨" title="Formit" subtitle="잠시만요…" />;
  }

  // 마케팅 랜딩 (로그인 여부와 무관 — 사이드바 「홈」으로 복귀)
  if (activeView.view === 'landing') {
    return (
      <>
        <Landing
          signedIn={authState.status === 'signed-in'}
          onSignIn={handleSignIn}
          onDemo={demoMode ? (() => setActiveView({ view: 'dashboard' })) : null}
          onNavTemplates={() => {
            if (demoMode || authState.status === 'signed-in') setActiveView({ view: 'templates' });
            else handleSignIn();
          }}
          onOpenDashboard={() => setActiveView({ view: 'dashboard' })}
        />
        {demoMode && <DemoBanner />}
        {tweaksOpen && <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} onClose={() => setTweaksOpen(false)} />}
        <Toast message={toast} onClose={() => setToast('')} />
      </>
    );
  }

  if (authState.status === 'signed-out' && !demoMode) {
    return <CenterMsg emoji="🔒" title="로그인이 필요해요"
      action={<button className="btn primary" onClick={() => setActiveView({ view: 'landing' })}>홈으로</button>} />;
  }

  // Preview respondent (in-app, signed-in only) — full screen
  if (activeView.view === 'respondent' && currentSurvey) {
    return (
      <>
        <Respondent survey={currentSurvey} setActiveView={setActiveView} onToast={setToast}
          onSubmit={() => { /* preview — not persisted */ }} />
        {tweaksOpen && <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} onClose={() => setTweaksOpen(false)} />}
        <Toast message={toast} onClose={() => setToast('')} />
      </>
    );
  }

  let content = null;
  switch (activeView.view) {
    case 'dashboard':
      content = <Dashboard surveys={surveys} setActiveView={setActiveView}
        onDelete={handleDelete} onDuplicate={handleDuplicate} />;
      break;
    case 'templates':
      content = <Templates setActiveView={setActiveView} />;
      break;
    case 'builder':
      content = currentSurvey
        ? <Builder survey={currentSurvey} onUpdate={handleSurveyUpdate}
            setActiveView={setActiveView} onShare={handleShare} onToast={setToast} />
        : <EmptyState emoji="🤔" title="설문을 찾을 수 없어요"
            desc="목록으로 돌아가서 다시 시도해주세요"
            action={<button className="btn primary" onClick={() => setActiveView({ view: 'dashboard' })}>대시보드로</button>} />;
      break;
    case 'share':
      content = currentSurvey
        ? <Share survey={currentSurvey} setActiveView={setActiveView} onToast={setToast} />
        : null;
      break;
    case 'results': {
      const targetSurvey = currentSurvey || surveys.find(s => s.status === 'live') || surveys[0];
      content = targetSurvey
        ? <Results survey={targetSurvey} setActiveView={setActiveView} demoMode={demoMode} />
        : <EmptyState emoji="📊" title="아직 분석할 설문이 없어요"
            desc="먼저 설문을 만들고 공개해보세요"
            action={<button className="btn primary" onClick={() => setActiveView({ view: 'builder', surveyId: 'new' })}>설문 만들기</button>} />;
      break;
    }
    default:
      content = <div>Unknown view</div>;
  }

  return (
    <>
      <div className="app-shell">
        <Sidebar activeView={activeView} setActiveView={setActiveView} surveys={surveys}
          user={authState.user} onSignOut={demoMode ? null : handleSignOut} />
        <div className="main-content">{content}</div>
      </div>
      <div className="mobile-nav">
        {[
          { id: 'landing', icon: 'home', label: '홈' },
          { id: 'dashboard', icon: 'inbox', label: '보드' },
          { id: 'templates', icon: 'grid', label: '템플릿' },
          { id: 'results', icon: 'chart', label: '분석' },
        ].map(item => (
          <button key={item.id} type="button" onClick={() => setActiveView({ view: item.id })}
            className={activeView.view === item.id ? 'active' : ''}>
            <Icon name={item.icon} size={18} />
            <span>{item.label}</span>
          </button>
        ))}
      </div>
      {demoMode && <DemoBanner />}
      {tweaksOpen && <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} onClose={() => setTweaksOpen(false)} />}
      <Toast message={toast} onClose={() => setToast('')} />
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);


</script>
</body>
</html>
